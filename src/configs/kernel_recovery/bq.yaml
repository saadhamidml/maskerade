# seed should ideally be in the experiment dictionary, but keeping it at
# the root allows Sacred to manage it.
seed: 5506315
collection: null
experiment:
  directories:
    data: "../data"
    logs: "../logs"
  smoke_test: False
  disable_cuda: False
  cuda_device: 0
  default_data_type: "float64"
problem:
  name: "kernel_recovery"
  mixture_means: [[0.5, 1., 0.25, 1.6, 0.9]]
  mixture_scales: [[0.1, 0.05, 0.075, 0.15, 0.4]]
  mixture_weights: [[0.35, 0.65, 0.1, 0.6, 0.3]]
  bounds:
    lower: -5
    upper: 5
  density: 150
  noise: 0.01
  test_size: 0.33
  shuffle: False
model:
  type: "gaussian_process"
  collection: True
  approximation: "exact"
  mean_function:
    type: "constant"
  covariance_function:
    type: "bayesian_gaussian_spectral_mixture"
    num_mixtures: [1, 2, 3]
    prior: "automatic"
  likelihood:
    type: "gaussian"
  marginal_log_likelihood:
    type: "exact"
numerics:
  strategy: "bayesian_quadrature"
  load_id: null
  evaluation_budget: 1500
  time_budget: null
  infer_while_learning: False
  initialisation:
    strategy: "sobol"
    num_samples: 1280
  surrogate:
    model:
      warping: "linearised_square_root"
      mean_function:
        type: "constant"
      covariance_function:
        type: "energy_distance_mmd"
      likelihood:
        type: "gaussian"
      marginal_log_likelihood:
        type: "exact"
      alpha_factor: 0.8
    numerics:
      strategy: "optimisation"
      initialisation:
        lengthscale: 1.0
      optimiser:
        type: "lbfgs"
      optimise_every: 1
  acquisition_function:
    type: "fit_bq"
    numerics:
      strategy: "optimisation"
      initialisation:
        strategy: "sample_prior"
        num_samples: 5000
      optimiser:
        type: "lbfgs"
    batch_size: 5
    num_batches: 1
  kernel_integration_num_samples: 1024
visualisation:
  bounds:
    lower: 0
    upper: 1
  