# seed should ideally be in the experiment dictionary, but keeping it at
# the root allows Sacred to manage it.
#seed: 0
experiment:
  directories:
    data: "../data"
    logs: "../logs"
  smoke_test: False
  disable_cuda: False
  cuda_device: 0
  default_data_type: "float64"
problem:
  name: "mauna_loa"
  remove_linear_trend: False
  test_size: 0.33
  shuffle: False
model:
  type: "gaussian_process"
  collection: False
  approximation: "exact"
  mean_function:
    type: "constant"
  covariance_function:
    type: "spectral_gaussian_process"
    n_frequencies: 100
    spacing: 'even'
    max_frequency: 250
  likelihood:
    type: "gaussian"
  marginal_log_likelihood:
    type: "exact"
numerics:
  strategy: "ess_expectation_maximisation"
  load_id: null
  time_budget: null
  infer_while_learning: False
  n_ess_iterations: 100
  n_ess_samples_per_iteration: 20
  n_optimiser_iterations: 1
  n_integration_samples: 50
visualisation:
  bounds:
    lower: 0
    upper: 1